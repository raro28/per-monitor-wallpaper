name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="per-monitor-wallpaper@ekthor"
          mkdir -p "$STAGE"
          cp dist/extension.js dist/metadata.json "$STAGE/"
          tar czf "per-monitor-wallpaper-${VERSION}.tar.gz" "$STAGE"
      - uses: softprops/action-gh-release@v2
        with:
          files: per-monitor-wallpaper-*.tar.gz
